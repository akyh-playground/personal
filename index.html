<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Click Counter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="counter-card" aria-live="polite">
      <h1>Click Counter</h1>
      <p class="subtitle">Your count is saved automatically in your browser.</p>

      <p class="count-label">Count</p>
      <p id="count" class="count-value">0</p>

      <button id="increment-btn" type="button">Click me</button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
